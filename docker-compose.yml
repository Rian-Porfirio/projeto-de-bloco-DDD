services:
  db:
    image: postgres:16-alpine
    container_name: freight-db
    environment:
      POSTGRES_DB: freight
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight -d freight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./freight-comparator-backend
    container_name: freight-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/freight
      SPRING_DATASOURCE_USERNAME: freight
      SPRING_DATASOURCE_PASSWORD: freight
      LOCATION_PROVIDER: mock
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./freight-comparator-frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
